<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>JBD NY Sales Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
:root{--ink:#14241a;--gold:#c9a24b;--green:#1f7a44;--orange:#e08a1e;--gray:#8a8f99;--blue:#2f6fb0}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
#app{display:flex;height:100vh;overflow:hidden}
#side{width:360px;min-width:360px;background:#f6f7f5;border-right:1px solid #e2e4df;display:flex;flex-direction:column}
#brand{padding:12px 14px;background:var(--ink);color:#fff}
#brand h1{margin:0;font-size:16px;letter-spacing:.5px}
#brand .sub{font-size:11px;color:var(--gold);margin-top:2px}
#filters{padding:10px 14px;border-bottom:1px solid #e2e4df;font-size:12px;overflow-y:auto;max-height:46%}
#filters input[type=text]{width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:6px;margin-bottom:8px;font-size:13px}
.frow{margin:6px 0}
.frow b{display:block;font-size:10px;text-transform:uppercase;color:#777;letter-spacing:.5px;margin-bottom:3px}
.chip{display:inline-block;padding:3px 8px;margin:2px 3px 2px 0;border:1px solid #ccc;border-radius:20px;cursor:pointer;background:#fff;user-select:none}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
#stats{padding:8px 14px;font-size:11px;color:#555;border-bottom:1px solid #e2e4df;background:#fff}
#list{flex:1;overflow-y:auto}
.card{padding:9px 14px;border-bottom:1px solid #eee;cursor:pointer}
.card:hover{background:#eef3ee}
.card .nm{font-weight:600;font-size:13px}
.card .meta{font-size:11px;color:#666;margin-top:2px}
.badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:10px;color:#fff;margin-right:4px;vertical-align:middle}
.b-cust{background:var(--green)}.b-prosp{background:var(--orange)}.b-lead{background:var(--gray)}.b-won{background:var(--blue)}
.b-t1{background:#8e2b2b}.b-t2{background:#b5742a}.b-t3{background:#5b6e57}
#main{flex:1;position:relative}#map{position:absolute;inset:0}
#route{position:absolute;top:10px;right:10px;width:300px;background:#fff;border:1px solid #ccc;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.15);font-size:12px;z-index:1000;max-height:80vh;display:flex;flex-direction:column}
#route h3{margin:0;padding:8px 10px;background:var(--ink);color:#fff;font-size:13px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;gap:6px;cursor:pointer}
#route.collapsed{width:auto}
#route.collapsed .rbody{display:none}
#route .rbody{padding:8px 10px;overflow-y:auto}
#route h3 .hbtn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:5px;padding:2px 8px;font-size:13px;cursor:pointer}
#route ol{margin:4px 0;padding-left:20px}#route li{margin:3px 0}
#route .btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
button{font:inherit;padding:6px 10px;border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:6px;cursor:pointer;font-size:12px}
button.ghost{background:#fff;color:var(--ink)}
.legend{position:absolute;bottom:14px;left:14px;background:#fff;padding:8px 10px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.2);font-size:11px;z-index:1000;line-height:1.7}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
.lp b{font-size:13px}.lp .row{margin:3px 0;font-size:12px}.lp .k{color:#888}
.tools{padding:8px 14px;border-bottom:1px solid #e2e4df;display:flex;gap:6px;flex-wrap:wrap;background:#fff}
@media(max-width:760px){#side{width:100%;min-width:0;position:absolute;z-index:1200;height:50vh;bottom:0;top:auto}#main{height:50vh}}
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <div id="brand"><h1>JEROME BAKER · NY SALES MAP</h1><div class="sub">Targets · Accounts · Routing</div></div>
    <div class="tools">
      <button id="near" class="ghost">📍 Near me</button>
      <button id="tgtonly" class="ghost">★ Targets only</button>
      <button id="reset" class="ghost">Reset</button>
    </div>
    <div id="filters">
      <input id="q" type="text" placeholder="Search name / city / neighborhood…"/>
      <div class="frow"><b>JB Lifecycle</b><div id="f-life"></div></div>
      <div class="frow"><b>Target Tier</b><div id="f-tier"></div></div>
      <div class="frow"><b>Region</b><div id="f-grp"></div></div>
      <div class="frow"><b>Store Size (throughput)</b><div id="f-size"></div></div>
      <div class="frow"><label><input type="checkbox" id="f-dfly"/> Dragonfly relationship only</label></div>
    </div>
    <div id="stats"></div>
    <div id="list"></div>
  </div>
  <div id="main">
    <div id="map"></div>
    <div id="route" class="collapsed">
      <h3 id="rhead"><span>🧭 Route <span id="rcount"></span></span><span><button id="optimize" class="hbtn" title="Optimize order">Optimize</button> <button id="rtoggle" class="hbtn" title="Show/hide">▸</button></span></h3>
      <div class="rbody">
        <div id="rstart" style="font-size:11px;color:#666">Start: nearest-neighbor from first stop (or “Near me”).</div>
        <ol id="rlist"></ol>
        <div id="rdist" style="font-weight:600"></div>
        <div class="btns">
          <button id="gmaps">Open in Google Maps</button>
          <button id="rclear" class="ghost">Clear</button>
        </div>
      </div>
    </div>
    <div class="legend">
      <div><span class="dot" style="background:#1f7a44"></span>Customer</div>
      <div><span class="dot" style="background:#e08a1e"></span>Prospect</div>
      <div><span class="dot" style="background:#2f6fb0"></span>Closed Won</div>
      <div><span class="dot" style="background:#8a8f99"></span>Lead</div>
      <div><span class="dot" style="background:#8e2b2b;border:2px solid #c9a24b"></span>★ Target</div>
    </div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

function chips(id,vals,key){const el=document.getElementById(id);vals.forEach(v=>{const c=document.createElement('span');c.className='chip';c.textContent=v;c.onclick=()=>{c.classList.toggle('on');if(F[key].has(v))F[key].delete(v);else F[key].add(v);render();};el.appendChild(c);});}

document.getElementById('reset').onclick=()=>{location.reload();};

function pass(a){
  if(F.tgtonly && !a.tier) return false;
  if(F.life.size && !F.life.has(a.life)) return false;
  if(F.tier.size && !F.tier.has(a.tier)) return false;
  if(F.grp.size && !F.grp.has(a.grp)) return false;
  if(F.size.size && !F.size.has(a.size)) return false;
  if(F.dfly && !a.dfly) return false;
  if(F.q){const s=(a.name+' '+a.city+' '+a.neighborhood+' '+a.county).toLowerCase();if(!s.includes(F.q))return false;}
  return true;
}
function dist(a,b){const R=3958.8,dl=(b.lat-a.lat)*Math.PI/180,dg=(b.lng-a.lng)*Math.PI/180,
  x=Math.sin(dl/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dg/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));}

function popupHtml(a){
  let h=`<div class="lp"><b>${a.name}</b><br>${lifeBadge(a.life)}${tierBadge(a.tier)}`;
  h+=`<div class="row"><span class="k">Addr:</span> ${a.addr}, ${a.city} ${a.zip}</div>`;
  if(a.neighborhood)h+=`<div class="row"><span class="k">Area:</span> ${a.neighborhood}${a.grp?' · '+a.grp:''}</div>`;
  h+=`<div class="row"><span class="k">License:</span> ${a.license||'—'} (${a.status||a.op||'?'})</div>`;
  h+=`<div class="row"><span class="k">Store size:</span> ${a.size}${a.dfly?' · Dragonfly acct':''}</div>`;
  if(a.tier)h+=`<div class="row"><span class="k">Allocation:</span> ${a.alloc[0]} jars · ${a.alloc[1]} pre-rolls · ${a.alloc[2]} box sets</div>`;
  if(a.contact)h+=`<div class="row"><span class="k">Contact:</span> ${a.contact}</div>`;
  if(a.nabis)h+=`<div class="row"><span class="k">Nabis:</span> ${a.nabis}</div>`;
  if(a.note)h+=`<div class="row"><span class="k">Note:</span> ${a.note}</div>`;
  const g=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(a.addr+', '+a.city+' NY '+a.zip)}`;
  h+=`<div class="row" style="margin-top:6px"><a href="${g}" target="_blank">▶ Directions</a> &nbsp;|&nbsp; <a href="#" onclick="addRoute('${a.license||a.name.replace(/'/g,"")}');return false;">＋ Add to route</a></div>`;
  if(a.web)h+=`<div class="row"><a href="${a.web.startsWith('http')?a.web:'https://'+a.web}" target="_blank">${a.web}</a></div>`;
  return h+`</div>`;
}

function markerFor(a){
  const isT=!!a.tier, r=isT?8:6;
  const m=L.circleMarker([a.lat,a.lng],{radius:r,weight:isT?3:1,
     color:isT?'#c9a24b':'#fff',fillColor:lifeColor(a.life),fillOpacity:.9});
  m.bindPopup(()=>popupHtml(a),{maxWidth:300});
  m._a=a; return m;
}

  let vis=DATA.filter(pass);
  if(userLoc)vis.sort((x,y)=>dist(userLoc,x)-dist(userLoc,y));
  vis.forEach(a=>cluster.addLayer(markerFor(a)));
  // stats
  const c=k=>vis.filter(a=>a.life===k).length;
  document.getElementById('stats').innerHTML=
    `<b>${vis.length}</b> shown · Targets ${vis.filter(a=>a.tier).length} · Cust ${c('Customer')} · Prosp ${c('Prospect')} · Lead ${c('Lead')}`;
  // list (cap 300)
  const L2=document.getElementById('list');L2.innerHTML='';
  vis.slice(0,300).forEach(a=>{
    const d=document.createElement('div');d.className='card';
    d.innerHTML=`<div class="nm">${tierBadge(a.tier)}${a.name}</div>
      <div class="meta">${lifeBadge(a.life)} ${a.city}${a.neighborhood?' · '+a.neighborhood:''} · ${a.size}${userLoc?' · '+dist(userLoc,a).toFixed(1)+' mi':''}</div>`;
    d.onclick=()=>{map.setView([a.lat,a.lng],14);const mk=markerFor(a);cluster.addLayer(mk);mk.openPopup();};
    L2.appendChild(d);
  });
}
function setCollapsed(c){const r=document.getElementById('route');r.classList.toggle('collapsed',c);document.getElementById('rtoggle').textContent=c?'▸':'▾';}
document.getElementById('rtoggle').onclick=e=>{e.stopPropagation();setCollapsed(!document.getElementById('route').classList.contains('collapsed'));};
document.getElementById('rhead').onclick=e=>{if(e.target.id==='optimize'||e.target.id==='rtoggle')return;setCollapsed(!document.getElementById('route').classList.contains('collapsed'));};
window.addRoute=function(id){const a=byId[id];if(!a)return;if(!route.includes(a)){route.push(a);drawRoute();setCollapsed(false);}};
function drawRoute(){
  const ol=document.getElementById('rlist');ol.innerHTML='';
  route.forEach((a,i)=>{const li=document.createElement('li');li.innerHTML=`${a.name} <a href="#" onclick="rmRoute(${i});return false;" style="color:#b00">✕</a>`;ol.appendChild(li);});
  document.getElementById('rcount').textContent=route.length?`(${route.length})`:'';
  if(routeLine)map.removeLayer(routeLine);
  if(route.length>1){routeLine=L.polyline(route.map(a=>[a.lat,a.lng]),{color:'#8e2b2b',weight:3,dashArray:'6 6'}).addTo(map);
    let d=0;for(let i=1;i<route.length;i++)d+=dist(route[i-1],route[i]);
    document.getElementById('rdist').textContent=`${route.length} stops · ~${d.toFixed(1)} mi (straight-line)`;
  } else document.getElementById('rdist').textContent='';
}
window.rmRoute=function(i){route.splice(i,1);drawRoute();};
document.getElementById('rclear').onclick=()=>{route=[];if(routeLine){map.removeLayer(routeLine);routeLine=null;}drawRoute();setCollapsed(true);};
document.getElementById('optimize').onclick=()=>{
  if(route.length<3)return;
  let start=userLoc?{lat:userLoc.lat,lng:userLoc.lng}:route[0];
  let pool=route.slice(),ordered=[],cur=start;
  while(pool.length){let bi=0,bd=1e9;pool.forEach((p,i)=>{const dd=dist(cur,p);if(dd<bd){bd=dd;bi=i;}});cur=pool[bi];ordered.push(cur);pool.splice(bi,1);}
  route=ordered;drawRoute();
};
document.getElementById('gmaps').onclick=()=>{
  if(!route.length)return;
  const pts=route.map(a=>encodeURIComponent(a.addr+', '+a.city+' NY '+a.zip));
  let url='https://www.google.com/maps/dir/?api=1';
  if(userLoc)url+='&origin='+userLoc.lat+','+userLoc.lng;
  url+='&destination='+pts[pts.length-1];
  if(pts.length>1)url+='&waypoints='+pts.slice(0,-1).join('%7C');
  window.open(url,'_blank');
};
document.getElementById('near').onclick=()=>{
  navigator.geolocation.getCurrentPosition(p=>{
    userLoc={lat:p.coords.latitude,lng:p.coords.longitude};
    if(userMarker)map.removeLayer(userMarker);
    userMarker=L.marker([userLoc.lat,userLoc.lng]).addTo(map).bindPopup('You are here').openPopup();
    map.setView([userLoc.lat,userLoc.lng],11);render();
  },()=>alert('Location unavailable'));
};
render();
</script>
</body>
