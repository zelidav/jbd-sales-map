#list{flex:1;overflow-y:auto}
.card{padding:9px 14px;border-bottom:1px solid #eee;cursor:pointer;position:relative}

.badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:10px;color:#fff;margin-right:4px}

.addr{position:absolute;top:8px;right:10px;font-size:18px;color:#2f6fb0;cursor:pointer;font-weight:700}
#main{flex:1;position:relative}#map{position:absolute;inset:0}

  #botbtn{bottom:calc(18px + env(safe-area-inset-bottom,0px));right:14px;padding:11px 15px;z-index:1500}
  body.popupopen #mobtoggle,body.popupopen #botbtn{display:none}
  #bot{position:fixed;inset:0;left:0;right:0;top:0;bottom:0;width:100%;height:100vh;height:100dvh;max-width:none;max-height:none;border-radius:0;z-index:1700}
  #botmsgs{overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
  #botq{padding-bottom:calc(9px + env(safe-area-inset-bottom,0px))}

  .leaflet-popup-content-wrapper{border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.35)}
  .leaflet-popup-content{width:86vw!important;max-width:360px;margin:15px 16px;font-size:15px;line-height:1.6;max-height:62vh;overflow-y:auto;-webkit-overflow-scrolling:touch}

  .leaflet-popup-content .dec,.leaflet-popup-content .rosin{font-size:12px;padding:2px 7px}

  .leaflet-popup-content [style*="font-size:9px"],
  .leaflet-popup-content [style*="font-size:10px"],
  .leaflet-popup-content [style*="font-size:11px"]{font-size:13.5px!important}
  .leaflet-popup-content [style*="height:9px"]{height:14px!important}
  .leaflet-popup-content svg{transform:scale(1.4);transform-origin:left center;margin:6px 0 14px}
  .leaflet-popup-close-button{font-size:26px!important;width:38px!important;height:38px!important;padding:4px 0 0!important}
}

 document.getElementById('route').style.display=(route.length||window.innerWidth>760)?'flex':'none';
 var sc=document.getElementById('rstart');if(sc)sc.style.display=route.length>=2?'block':'none';

 if(startMarker){map.removeLayer(startMarker);startMarker=null;}if(endMarker){map.removeLayer(endMarker);endMarker=null;}

 if(routeLine)map.removeLayer(routeLine);
 var pts=route.map(function(d){return [d.lat,d.lng];});if(startPt)pts.unshift([startPt.lat,startPt.lng]);if(endPt)pts.push([endPt.lat,endPt.lng]);
 if(pts.length>1){routeLine=L.polyline(pts,{color:'#14241a',weight:3,opacity:.6,dashArray:'6,6'}).addTo(map);}

var FAMCOL={Flower:'#3f7a44',Vape:'#2f6fb0',Preroll:'#c9a24b','Infused PR':'#b5742a',Edibles:'#8e44ad',Other:'#8a8f99'};
function mixTag(lic){var m=lic&&window.MIX&&MIX[lic];if(!m||!m.fam)return '';var best='',bv=0;for(var k in m.fam){if(m.fam[k]>bv){bv=m.fam[k];best=k;}}return best?' · <span style="color:'+(FAMCOL[best]||'#888')+'">●</span>'+best+'-led':'';}
function spark(mo){if(!mo||!mo.length)return '';var max=Math.max.apply(null,mo.map(function(x){return x[1];}))||1;var w=18,gap=4,h=26;
 var bars=mo.map(function(x,i){var bh=Math.max(2,x[1]/max*h);return '<rect x="'+(i*(w+gap))+'" y="'+(h-bh)+'" width="'+w+'" height="'+bh+'" fill="#14241a" opacity="0.75"><title>'+x[0]+': $'+x[1].toLocaleString()+'</title></rect>';}).join('');
 var labels=mo.map(function(x,i){return '<text x="'+(i*(w+gap)+w/2)+'" y="'+(h+9)+'" font-size="7" text-anchor="middle" fill="#999">'+x[0].slice(5)+'</text>';}).join('');
 return '<div style="margin-top:5px"><div style="font-size:10px;color:#555"><b>Monthly $</b></div><svg width="'+(mo.length*(w+gap))+'" height="'+(h+12)+'">'+bars+labels+'</svg></div>';}
function mixHtml(lic){var m=lic&&window.MIX&&MIX[lic];if(!m)return '';var tot=0;for(var k in m.fam)tot+=m.fam[k];if(!tot)return '';
 var bar='<div style="display:flex;height:9px;border-radius:5px;overflow:hidden;margin:4px 0">';
 MIX_FAMS.forEach(function(f){if(m.fam[f]){var p=m.fam[f]/tot*100;bar+='<div title="'+f+' $'+m.fam[f].toLocaleString()+' ('+p.toFixed(0)+'%)" style="width:'+p+'%;background:'+(FAMCOL[f]||'#888')+'"></div>';}});bar+='</div>';
 var leg=MIX_FAMS.filter(function(f){return m.fam[f];}).map(function(f){return '<span style="white-space:nowrap;margin-right:6px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+(FAMCOL[f]||'#888')+';margin-right:3px"></span>'+f+' '+(m.fam[f]/tot*100).toFixed(0)+'%</span>';}).join(' ');
 var top=(m.top||[]).slice(0,3).map(function(t){return '• '+t[0]+' ($'+t[1].toLocaleString()+')';}).join('<br>');
 return '<div style="margin-top:6px;border-top:1px solid #eee;padding-top:5px">'
  +'<b>Product mix</b> · $'+m.rev.toLocaleString()+' / '+m.o+' orders'+(m.last?' · last '+m.last:'')+bar
  +'<div style="font-size:10px;color:#555;line-height:1.7">'+leg+'</div>'+spark(m.mo)
  +'<div style="font-size:10px;color:#555;margin-top:4px"><b>Top SKUs</b><br>'+top+'</div>'
  +'<div style="font-size:10px;margin-top:4px"><a href="#" onclick="askMix(\''+lic+'\');return false;">📈 Ask the bot about this account</a></div></div>';}
window.askMix=function(lic){var d=DATA.find(function(x){return (x.lic||'').toUpperCase()===String(lic).toUpperCase();});var nm=d?d.n:lic;
 document.getElementById('botbtn').click();botAsk('Break down the product mix and month-over-month trend for '+nm+' ('+lic+'). What should the rep push or reintroduce next?');};

var BOT_URL="https://jbd-sales-bot-ltqqg7poja-uc.a.run.app";

function esc(s){return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function inl(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');}

// Lightweight markdown -> html, with special handling for ```route blocks and tables.
function renderBot(text){
  var lines=text.split('\n'),out=[],i=0;
  function tableRow(l){return l.trim().indexOf('|')>=0;}
  while(i<lines.length){
    var l=lines[i];
    if(/^```/.test(l.trim())){
      var lang=l.trim().slice(3).trim().toLowerCase(),body=[];i++;
      while(i<lines.length && !/^```/.test(lines[i].trim())){body.push(lines[i]);i++;}
      i++; // skip closing fence
      if(lang==='route'){
        var ids=body.map(function(x){return x.trim();}).filter(Boolean);
        out.push('<button class="routebtn" data-route="'+esc(JSON.stringify(ids))+'">📍 Plot route ('+ids.length+' stops) on map</button>');
      } else { out.push('<pre style="background:#eef0ec;padding:6px;border-radius:6px;overflow-x:auto;font-size:12px">'+esc(body.join('\n'))+'</pre>'); }
      continue;
    }
    // table: header row + separator row of ---
    if(tableRow(l) && i+1<lines.length && /^[\s|:\-]+$/.test(lines[i+1]) && lines[i+1].indexOf('-')>=0){
      var rows=[];rows.push(l);i++; // header
      i++; // separator
      while(i<lines.length && tableRow(lines[i]) && lines[i].trim()){rows.push(lines[i]);i++;}
      var cells=function(r){var p=r.trim().replace(/^\||\|$/g,'').split('|');return p.map(function(c){return c.trim();});};
      var h='<table><tr>'+cells(rows[0]).map(function(c){return '<th>'+inl(c)+'</th>';}).join('')+'</tr>';
      for(var r=1;r<rows.length;r++){h+='<tr>'+cells(rows[r]).map(function(c){return '<td>'+inl(c)+'</td>';}).join('')+'</tr>';}
      out.push(h+'</table>');continue;
    }
    // bullet / numbered list
    if(/^\s*[-*]\s+/.test(l)){var b=[];while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){b.push('<li>'+inl(lines[i].replace(/^\s*[-*]\s+/,''))+'</li>');i++;}out.push('<ul style="margin:4px 0;padding-left:18px">'+b.join('')+'</ul>');continue;}
    if(/^\s*\d+\.\s+/.test(l)){var o=[];while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){o.push('<li>'+inl(lines[i].replace(/^\s*\d+\.\s+/,''))+'</li>');i++;}out.push('<ol style="margin:4px 0;padding-left:20px">'+o.join('')+'</ol>');continue;}
    if(l.trim()===''){out.push('');i++;continue;}
    // paragraph (gather consecutive plain lines)
    var par=[];while(i<lines.length && lines[i].trim()!=='' && !/^```/.test(lines[i].trim()) && !/^\s*[-*]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i]) && !(tableRow(lines[i])&&i+1<lines.length&&/^[\s|:\-]+$/.test(lines[i+1])&&lines[i+1].indexOf('-')>=0)){par.push(inl(lines[i]));i++;}
    out.push('<div>'+par.join('<br>')+'</div>');
  }
  return out.join('');
}

function plotRoute(ids){
  document.getElementById('rclear').click();
  var added=[];
  ids.forEach(function(raw){
    var s=String(raw).trim().toLowerCase();if(!s)return;
    var d=DATA.find(function(x){return (x.lic||'').toLowerCase()===s;})
        ||DATA.find(function(x){return x.n.toLowerCase()===s;})
        ||DATA.find(function(x){return x.n.toLowerCase().indexOf(s)>=0;});
    if(d && !added.includes(d)){window.addRoute(d.lic||d.n,d);added.push(d);}
  });
  if(added.length){
    if(window.innerWidth<=760){document.getElementById('bot').classList.remove('open');}
    try{map.fitBounds(L.latLngBounds(added.map(function(d){return [d.lat,d.lng];})).pad(0.25));}catch(e){}
  }
  return added.length;
}

// Inject an inline "+route" button right after EACH store the bot names, in place
// (in the table row / list item it appears in), so you add stops as you scroll.
function isWordChar(c){return (c>=48&&c<=57)||(c>=97&&c<=122);} // 0-9 or a-z
// first occurrence of `name` in `low` not glued to another word (whole-word), else -1
function firstBoundary(low,name){var from=0,idx;while((idx=low.indexOf(name,from))>=0){
  var b=idx>0?low.charCodeAt(idx-1):32,a=(idx+name.length)<low.length?low.charCodeAt(idx+name.length):32;
  if(!isWordChar(b)&&!isWordChar(a))return idx;from=idx+1;}return -1;}
function injectInlineAdds(bubEl){
  if(!window.__storeNames){window.__storeNames=DATA.filter(function(d){return d.lat&&d.n&&d.n.length>=3;})
    .map(function(d){return {low:d.n.toLowerCase(),len:d.n.length,d:d};}).sort(function(a,b){return b.len-a.len;});}
  var names=window.__storeNames;
  var w=document.createTreeWalker(bubEl,NodeFilter.SHOW_TEXT,null),q=[];
  while(w.nextNode())q.push(w.currentNode);
  q.forEach(function(tn){
    var guard=0;
    while(tn&&tn.nodeValue&&guard++<12){
      if(tn.parentNode&&tn.parentNode.closest&&tn.parentNode.closest('.iadd'))break;
      var low=tn.nodeValue.toLowerCase(),best=-1,bn=null;
      for(var i=0;i<names.length;i++){var idx=firstBoundary(low,names[i].low);if(idx>=0&&(best<0||idx<best)){best=idx;bn=names[i];}}
      if(best<0)break;
      var after=tn.splitText(best+bn.low.length);
      var btn=document.createElement('button');btn.className='iadd';btn.title='Add to route';btn.textContent='+route';
      (function(acc){btn.onclick=function(){window.addRoute(acc.lic||acc.n,acc);btn.textContent='✓';btn.classList.add('done');btn.disabled=true;};})(bn.d);
      tn.parentNode.insertBefore(btn,after);
      tn=after; // continue scanning the remainder for more stores
    }
  });
}
function wireReply(d){
  d.querySelectorAll('.routebtn').forEach(function(btn){
    btn.onclick=function(){var n=plotRoute(JSON.parse(btn.dataset.route));btn.textContent=n?('✓ Plotted '+n+' stops — see map & Route builder'):'Could not match these stops';btn.disabled=true;btn.style.opacity=.7;};
  });
}
function addBubble(role,html){
  var d=document.createElement('div');d.className='bm '+(role==='user'?'u':'a');
  d.innerHTML='<div class="bub">'+(role==='user'?'<div>'+html+'</div>':html)+'</div>';botmsgs.appendChild(d);
  wireReply(d);
  botmsgs.scrollTop=botmsgs.scrollHeight;return d;
}

async function botAsk(text){
  if(botBusy||!text.trim())return;
  botBusy=true;botsend.disabled=true;
  botMsgs.push({role:'user',content:text});
  addBubble('user',esc(text));
  botin.value='';botin.style.height='auto';
  var wait=addBubble('assistant','<span class="tip">thinking…</span>');
  try{
    var res=await fetch(BOT_URL+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:botMsgs})});
    var j=await res.json();
    if(!res.ok)throw new Error(j.error||('HTTP '+res.status));
    var bub=wait.querySelector('.bub');bub.innerHTML=renderBot(j.reply);
    wireReply(wait);
    injectInlineAdds(bub);
    botMsgs.push({role:'assistant',content:j.reply});
  }catch(err){
    wait.querySelector('.bub').innerHTML='<span style="color:#b00">⚠ '+esc(err.message)+'</span>';
  }
  botmsgs.scrollTop=botmsgs.scrollHeight;
  botBusy=false;botsend.disabled=false;botin.focus();
}
